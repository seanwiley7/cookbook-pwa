image: node:lts

stages:
  - deploy

pages:
  stage: deploy
  script:
    # Make sure the public folder exists
    - mkdir -p public

    # Copy all files except .git, .gitlab-ci.yml, and public itself
    - |
      for f in * .*; do
        if [[ "$f" != "." && "$f" != ".." && "$f" != "public" && "$f" != ".git" && "$f" != ".gitlab-ci.yml" ]]; then
          cp -r "$f" public/
        fi
      done

  artifacts:
    paths:
      - public

  only:
    - main
