# .gitlab-ci.yml
image: node:lts

stages:
  - deploy

pages:
  stage: deploy
  script:
    # Optional: if you ever add npm dependencies
    - npm ci || echo "No package.json, skipping npm install"
    # Make sure the public folder exists
    - mkdir -p public
    # Copy everything except Git files and the public folder itself
    - for f in * .*; do
        if [[ "$f" != "." && "$f" != ".." && "$f" != "public" && "$f" != ".git" && "$f" != ".gitlab-ci.yml" ]]; then
          cp -r "$f" public/
        fi
      done
  artifacts:
    paths:
      - public
  only:
    - main
